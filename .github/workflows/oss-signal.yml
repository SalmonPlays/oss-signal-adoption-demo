name: oss-signal adoption demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  maintainer-readiness:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5
      - uses: SalmonPlays/oss-signal@v0.8.4
        id: markdown
        with:
          path: SalmonPlays/oss-signal
          fail-under: "100"
          output: oss-signal-report.md
          summary: "true"
      - uses: SalmonPlays/oss-signal@v0.8.4
        with:
          path: SalmonPlays/oss-signal
          format: sarif
          output: oss-signal.sarif
          summary: "false"
      - uses: SalmonPlays/oss-signal@v0.8.4
        with:
          path: platformatic/massimo
          format: issue
          output: maintainer-follow-up.md
          summary: "false"
      - uses: SalmonPlays/oss-signal@v0.8.4
        with:
          path: SalmonPlays/oss-signal
          format: workflow
          output: oss-signal-trial.yml
          summary: "false"
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: oss-signal.sarif
      - uses: actions/upload-artifact@v5
        with:
          name: oss-signal-adoption-demo-report
          path: |
            oss-signal-report.md
            oss-signal.sarif
            maintainer-follow-up.md
            oss-signal-trial.yml
